<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartPOS - Gestão & PDV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes slide-in {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      .animate-slide-in {
        animation: slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#10b981', // Emerald 500
              secondary: '#3b82f6', // Blue 500
              dark: '#1e293b', // Slate 800
              brand: {
                light: '#e6f4ea',
                DEFAULT: '#10b981', // O verde esmeralda
                dark: '#059669',
              },
              neutral: {
                bg: '#f8fafc',      // Fundo levemente acinzetado (Slate 50)
                card: '#ffffff',    // Cards puramente brancos
                text: '#0f172a',    // Texto principal grafite escuro (Slate 900)
                muted: '#64748b',   // Textos secundários/legendas (Slate 500)
                border: '#e2e8f0',  // Bordas finas e discretas (Slate 200)
              }
            },
            borderRadius: {
              'smart': '12px',      // Todos os cantos do app terão o mesmo arredondamento
            }
          }
        }
      }
    </script>

    "recharts": "https://esm.sh/recharts@^3.7.0"
  }
}
</script>
