    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes slide-in {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      .animate-slide-in {
        animation: slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#3525cd', // Deep Indigo
                light: '#4f46e5',
                dark: '#213145',
              },
              secondary: '#006c49', // Emerald Success
              danger: '#ba1a1a', // Rose Danger
              background: '#f8f9ff', // Light Gray Surface color
              surface: '#ffffff', // Pure white cards
              onSurface: '#0b1c30', // Text color
              onSurfaceVariant: '#464555',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            borderRadius: {
              'button': '8px', // Corner radius for buttons/inputs
              'card': '12px', // Corner radius for cards/containers
            }
          }
        }
      }
    </script>
